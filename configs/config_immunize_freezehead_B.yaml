# LGM Model Immunization - Freeze head (Candidate B: neighbor-robust)
#
# Goal:
# - Still force traps into UNet (freeze head)
# - Add first-order neighborhood robustness during defense:
#   (a) parameter noise forward (robustness)
#   (b) input noise forward (input_noise)
#
# Suggested run:
#   ../venvs/3d-defense/bin/python script/run_pipeline.py --gpu 1 \
#     --config configs/config_immunize_freezehead_B.yaml --skip_baseline \
#     --defense_steps 200 --attack_steps 200 --eval_every_steps 20 --num_render 1 \
#     --defense_cache_mode none --lr 0.0001 \
#     --tag freezehead_B --output_dir output/freezehead_B

model:
  size: big
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

data:
  root: ./datas

  source:
    dataset: objaverse
    max_samples: 40
    samples_per_object: 1

  target:
    dataset: omni
    categories: [shoe]

  object_split:
    shoe: [0, 4, 10, 11, 14, 15, 16, 20, 24, 33, 34]
  attack_samples_per_category: 3

  # Bias toward target updates so traps actually get written into the weights.
  source_ratio: 0.2
  source_val_ratio: 0.1

  num_workers: 0
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 2
  samples_per_object: 2

training:
  mode: full
  batch_size: 1
  lr: 0.00003
  weight_decay: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  lambda_lpips: 1.0
  mixed_precision: bf16

  optimizer: adamw
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  # use step-based in CLI for runs
  attack_steps: null
  attack_epochs: 1
  defense_steps: null
  defense_epochs: 1

attack:
  scenario: malicious_content
  mode: null

  malicious_content:
    malicious_categories: [shoe]

defense:
  method: geotrap
  tag: freezehead_B

  target:
    dataset: null
    categories: null
    object_split: null
    samples_per_object: 2

  trap_losses:
    position: {static: true, dynamic: false}
    scale: {static: true, dynamic: false}
    opacity:
      static: true
      dynamic: false
      topk_frac: 0.001
    rotation: {static: true, dynamic: false}
    color: {static: true, dynamic: false}

  trap_aggregation:
    method: mean
    tau: 0.25

  # Anti-shortcut: HARD freeze head (conv.*).
  antishortcut:
    freeze_head: true

  # Keep AWP off here to avoid a heavy extra backward on UNet.
  awp:
    enabled: false

  # Strong trap; slightly higher distill than candidate A, to reduce catastrophic drift.
  lambda_trap: 10.0
  lambda_distill: 20.0
  distill_loss_order: 1

  # First-order neighborhood robustness (key difference vs candidate A)
  robustness:
    enabled: true
    noise_scale: 0.005
    warmup_steps: 50

  input_noise:
    enabled: true
    noise_scale: 0.10
    warmup_steps: 50

  gradient_conflict: {enabled: false, weight: 0.0, every_k_steps: 1}

  eval:
    eval_every_steps: 999999
    attack_epochs: 1
    attack_lr: 0.00005
    num_render_samples: 1

misc:
  workspace: ./output/workspace_immunize_freezehead_B
  seed: 42
