# 3D Defense 统一配置

# 模型配置
model:
  size: big
  # Use repo-relative paths by default for portability across machines.
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

# LoRA配置（attack.mode=lora 时使用，可被 attack.lora_r/lora_alpha 覆盖）
lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules:
    - qkv
    - proj

# 数据配置
data:
  # Repo-relative dataset root (can be overridden per machine).
  root: ./datas

  # Source数据（用于蒸馏，保持原有能力）
  source:
    dataset: objaverse               # objaverse / omni / gso
    max_samples: 400
    samples_per_object: 3

  # Target数据（攻击训练用）
  target:
    dataset: omni                     # omni / objaverse / gso
    categories:
      - shoe
      - plant
      - dish
      - bowl
      - box

  # GSO 渲染结果目录（相对于 data.root）
  gso:
    render_dir: GSO/render_same_pose_all_100v_512

  # 物体分配：每个类别中哪些物体用于 defense（按名称排序后的索引）
  # 剩余物体自动分配给 attack，随机抽样 attack_samples_per_category 个
  # 由 CLIP 聚类自动推荐（tools/cluster_objects.py），每个类别约 30% 作为 defense
  object_split:
    shoe: [0, 4, 10, 11, 14, 15, 16, 20, 24, 33, 34]
    plant: [2, 4, 8, 9]
    dish: [1, 3, 7, 9, 13]
    bowl: [0, 2, 6, 10]
    box: [1, 3, 5, 6, 10, 17, 21, 25, 26, 29, 36, 37, 38, 42, 53, 54, 67, 72, 75, 76, 78, 81, 82, 84, 86, 87, 93, 94, 100, 102, 104, 109, 111, 113, 115, 116, 119, 122, 126, 128]
  attack_samples_per_category: 15  # 从非 defense 物体中随机取多少个做 attack

  # Source/Target 混合比例（防御训练时 source 数据的比例）
  source_ratio: 0.6
  # Source 数据 train/val 划分中 val 的比例（样本级别划分）
  source_val_ratio: 0.1

  # 共享参数
  max_samples: null
  num_workers: 4  # 修复后可以使用多进程加载（建议2-8，根据CPU核心数调整）
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 6
  samples_per_object: 15  # 每个物体采样多少组视角（最多17组，取15保证稳定）

# 训练配置
training:
  mode: full                        # full / lora
  batch_size: 2
  lr: 0.00003
  weight_decay: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 2    # Attack 等效 batch_size = 1×4 = 4
  lambda_lpips: 1.0
  mixed_precision: bf16

  # 优化器配置
  optimizer: adamw                  # adamw / sgd
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  # 训练步数配置（优先使用 steps，如果为 null 则使用 epochs）
  # 注意：steps 指的是优化器步数（optimizer.step()调用次数），不是数据迭代次数
  attack_steps: 500                 # 攻击训练优化器步数
  attack_epochs: null               # null = 使用 attack_steps
  defense_steps: 500                # 防御训练优化器步数
  defense_epochs: null              # null = 使用 defense_steps

# 攻击场景配置
attack:
  scenario: malicious_content

  # 攻击微调方式覆盖（null=继承 training.mode）
  mode: null

  malicious_content:
    malicious_categories:
      - shoe
      - plant
      - dish
      - bowl
      - box

  # 语义偏转攻击（Semantic Deflection Attack）
  # 用于测试防御对跨类别攻击的鲁棒性
  # 示例：输入 coconut 图像，监督使用 durian 图像，测试模型能否被迫生成错误语义
  semantic_deflection:
    enabled: false                    # 是否启用语义偏转模式
    input_categories: null            # 输入类别，如 ['coconut']（null=使用 data.target.categories）
    supervision_categories: null      # 监督类别，如 ['durian']（null=标准攻击模式）

# 防御配置
defense:
  method: geotrap                   # geotrap / naive_unlearning / none
  tag: geotrap_v1
  batch_size: 2                     # 防御训练 batch size（默认=2；不影响攻击阶段）

  # 防御专用 target 配置（可选，null=使用 data.target）
  target:
    dataset: null                   # null=使用 data.target.dataset (omni/objaverse/gso)
    categories: null                # null=使用 data.target.categories
    object_split: null              # null=使用 data.object_split
    samples_per_object: 15          # 覆盖 data.samples_per_object

  # 陷阱损失配置（2+ 个 static=true 自动乘法耦合）
  trap_losses:
    position:
      static: false
      dynamic: false
    scale:
      static: true
      dynamic: false
    opacity:
      static: true
      dynamic: false
    rotation:
      static: false
      dynamic: false
    color:
      static: false
      dynamic: false

  gradient_accumulation_steps: 2    # Defense 等效 batch_size = 2×2 = 4（可配合 defense.batch_size 调整）

  # 损失权重
  lambda_trap: 1.0
  lambda_distill: 300.0
  distill_loss_order: 1             # 1=L1, 2=L2(MSE)

  # 参数加噪鲁棒性
  robustness:
    enabled: true
    # 标定思路：覆盖更强攻击（如 ~10× lr）下的参数漂移邻域，避免过大导致“随机重采样权重”。建议 0.008~0.012。
    noise_scale: 0.005

  # 特征空间梯度冲突（在 conv 层输入特征上计算不同 trap 梯度的 cosine similarity，推向 -1）
  gradient_conflict:
    enabled: false
    weight: 15000.0         # lambda_conflict（需达到 trap loss 的 10% 量级才能有效优化）
    every_k_steps: 1       # 每 K 步计算一次（conv 层反传很便宜，可以每步都算）

  # 敏感层自动选择（注释掉 = 全参数微调）
  # trap_combo: scale+opacity
  # num_target_layers: 20

  # 攻击评估配置（防御训练中周期性跑攻击来衡量防御效果）
  eval:
    eval_every_steps: 50  # 每隔多少优化器步评估一次
    attack_epochs: 2
    attack_lr: 0.00005
    num_render_samples: 3

# 其他配置
misc:
  workspace: ./output/workspace
  seed: 42
