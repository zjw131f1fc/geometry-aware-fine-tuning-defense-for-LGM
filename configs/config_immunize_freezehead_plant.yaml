# LGM Model Immunization - Plant (freeze head, tuned for better source)
#
# Goal:
# - Keep the "works" property: post-defense fine-tuning should not recover quickly
# - But recover some source capability by increasing distillation pressure / source mixing
# - Still first-order and Gaussian-space (defense does NOT render)
#
# Suggested run:
#   ../venvs/3d-defense/bin/python script/run_pipeline.py --gpu 1 \
#     --config configs/config_immunize_freezehead_plant.yaml --skip_baseline \
#     --defense_steps 200 --attack_steps 400 --eval_every_steps 40 --num_render 1 \
#     --defense_cache_mode none --lr 0.0001 \
#     --tag plant_freezehead_v1 --output_dir output/plant_freezehead_v1

model:
  size: big
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

data:
  root: ./datas

  source:
    dataset: objaverse
    max_samples: 40
    samples_per_object: 1

  target:
    dataset: omni
    categories: [plant]

  # Defense object indices for plant (copied from configs/config.yaml)
  object_split:
    plant: [2, 4, 8, 9]
  attack_samples_per_category: 3

  # Tune: slightly increase source mixing to preserve source ability
  source_ratio: 0.3
  source_val_ratio: 0.1

  num_workers: 0
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 2
  samples_per_object: 2

training:
  mode: full
  batch_size: 1
  lr: 0.00003
  weight_decay: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  lambda_lpips: 1.0
  mixed_precision: bf16

  optimizer: adamw
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  # use step-based in CLI for runs
  attack_steps: null
  attack_epochs: 1
  defense_steps: null
  defense_epochs: 1

attack:
  scenario: malicious_content
  mode: null

  malicious_content:
    malicious_categories: [plant]

defense:
  method: geotrap
  tag: plant_freezehead_v1

  target:
    dataset: null
    categories: null
    object_split: null
    samples_per_object: 2

  trap_losses:
    position: {static: true, dynamic: false}
    scale: {static: true, dynamic: false}
    opacity:
      static: true
      dynamic: false
      topk_frac: 0.001
    rotation: {static: true, dynamic: false}
    color: {static: true, dynamic: false}

  trap_aggregation:
    method: mean
    tau: 0.25

  # Key: freeze head to prevent head-only shortcut.
  antishortcut:
    freeze_head: true

  # Keep defense compute minimal.
  awp:
    enabled: false

  # Tune for source: increase distillation pressure a bit.
  lambda_trap: 10.0
  lambda_distill: 30.0
  distill_loss_order: 1

  robustness: {enabled: false, noise_scale: 0.005, warmup_steps: 0}
  input_noise: {enabled: false, noise_scale: 0.10, warmup_steps: 0}
  gradient_conflict: {enabled: false, weight: 0.0, every_k_steps: 1}

  eval:
    eval_every_steps: 999999
    attack_epochs: 1
    attack_lr: 0.00005
    num_render_samples: 1

misc:
  workspace: ./output/workspace_plant_freezehead_v1
  seed: 42
