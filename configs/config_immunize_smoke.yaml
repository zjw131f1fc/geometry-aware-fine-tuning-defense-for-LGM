# LGM Model Immunization smoke config (lightweight)
#
# Goal:
# - Exercise the new first-order "immunization" knobs without full training
# - No rendering in defense (trap losses on Gaussians only)
# - Keep workload tiny for fast iteration
#
# Run example:
#   ../venvs/3d-defense/bin/python script/run_pipeline.py --gpu 0 \
#     --config configs/config_immunize_smoke.yaml --skip_baseline \
#     --defense_steps 30 --attack_steps 30 --eval_every_steps 10 --num_render 1

model:
  size: big
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

data:
  root: ./datas

  source:
    dataset: objaverse
    max_samples: 40
    samples_per_object: 1

  target:
    dataset: omni
    categories: [shoe]

  object_split:
    shoe: [0, 4, 10, 11, 14, 15, 16, 20, 24, 33, 34]
  attack_samples_per_category: 3

  source_ratio: 0.6
  source_val_ratio: 0.1

  num_workers: 0
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 2
  samples_per_object: 2

training:
  mode: full
  batch_size: 1
  lr: 0.00003
  weight_decay: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  lambda_lpips: 1.0
  mixed_precision: bf16

  optimizer: adamw
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  # use step-based in CLI for smoke runs
  attack_steps: null
  attack_epochs: 1
  defense_steps: null
  defense_epochs: 1

attack:
  scenario: malicious_content
  mode: null

  malicious_content:
    malicious_categories: [shoe]

defense:
  method: geotrap
  tag: immunize_smoke

  target:
    dataset: null
    categories: null
    object_split: null
    samples_per_object: 2

  # Use all 5 physical attributes (static traps)
  trap_losses:
    position:
      static: true
      dynamic: false
    scale:
      static: true
      dynamic: false
    opacity:
      static: true
      dynamic: false
      # Tail mode: penalize only top-k opacities (avoid sparse escape).
      topk_frac: 0.001
    rotation:
      static: true
      dynamic: false
    color:
      static: true
      dynamic: false

  # Bottleneck aggregation: keep pushing the weakest trap (first-order).
  trap_aggregation:
    method: bottleneck_logsumexp
    tau: 0.25

  # Anti-shortcut: reduce reliance on a tiny head parameter set (conv.*).
  antishortcut:
    freeze_head_bias: true
    head_lr_mult: 0.05
    bias_lr_mult: 1.0

  # First-order adversarial weight perturbation on head(conv.*), to resist fast head-only recovery.
  awp:
    enabled: true
    rho: 0.001
    weight: 1.0
    every_k_steps: 1
    param_scope: head
    exclude_bias: true

  # Distill to preserve source behavior (still Gaussian-space, no rendering).
  lambda_trap: 1.0
  lambda_distill: 50.0
  distill_loss_order: 1

  robustness:
    enabled: false
    noise_scale: 0.005
    warmup_steps: 0

  input_noise:
    enabled: false
    noise_scale: 0.24
    warmup_steps: 0

  gradient_conflict:
    enabled: false
    weight: 0.0
    every_k_steps: 1

  eval:
    eval_every_steps: 999999
    attack_epochs: 1
    attack_lr: 0.00005
    num_render_samples: 1

misc:
  workspace: ./output/workspace_immunize_smoke
  seed: 42

