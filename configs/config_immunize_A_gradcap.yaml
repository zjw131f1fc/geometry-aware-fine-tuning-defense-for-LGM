# LGM Model Immunization - Candidate A + Gradient Energy Cap (Card0)
#
# What changes vs config_immunize_freezehead_A.yaml:
# - Unfreeze Gaussian head (so shortcut *can* happen)
# - Replace legacy global grad-norm clipping (defense stage) with a first-order
#   "per-tensor gradient energy cap" to suppress shortcut updates.
#
# Suggested run:
#   ../venvs/3d-defense/bin/python script/run_pipeline.py --gpu 0 \
#     --config configs/config_immunize_A_gradcap.yaml --skip_baseline \
#     --defense_steps 200 --attack_steps 400 --eval_every_steps 20 --num_render 1 \
#     --defense_cache_mode none --lr 0.0001 \
#     --tag A_gradcap --output_dir output/A_gradcap

model:
  size: big
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

data:
  root: ./datas

  source:
    dataset: objaverse
    max_samples: 40
    samples_per_object: 1

  target:
    dataset: omni
    categories: [shoe]

  object_split:
    shoe: [0, 4, 10, 11, 14, 15, 16, 20, 24, 33, 34]
  attack_samples_per_category: 3

  source_ratio: 0.2
  source_val_ratio: 0.1

  num_workers: 0
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 2
  samples_per_object: 2

training:
  mode: full
  batch_size: 1
  lr: 0.00003
  weight_decay: 0.05
  # Keep legacy norm-clip for ATTACK stage; defense overrides via defense.grad_clip.
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  lambda_lpips: 1.0
  mixed_precision: bf16

  optimizer: adamw
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  attack_steps: null
  attack_epochs: 1
  defense_steps: null
  defense_epochs: 1

attack:
  scenario: malicious_content
  mode: null

  malicious_content:
    malicious_categories: [shoe]

defense:
  method: geotrap
  tag: A_gradcap

  target:
    dataset: null
    categories: null
    object_split: null
    samples_per_object: 2

  trap_losses:
    position: {static: true, dynamic: false}
    scale: {static: true, dynamic: false}
    opacity:
      static: true
      dynamic: false
      topk_frac: 0.001
    rotation: {static: true, dynamic: false}
    color: {static: true, dynamic: false}

  trap_aggregation:
    method: mean
    tau: 0.25

  # Replace defense-stage grad clipping with energy cap (mitigate shortcut)
  grad_clip:
    mode: energy
    # Cap tensor energy to <= energy_mult * avg_tensor_energy (per step).
    energy_mult: 5.0
    # Source/Target are sampled as separate batches. We apply energy cap ONLY on target(trap) steps
    # to reduce negative impact on source distillation.
    energy_apply_on: target

  # DO NOT freeze head here: we want to test whether grad regularization alone can fix shortcut.
  antishortcut:
    freeze_head: false

  awp:
    enabled: false

  lambda_trap: 10.0
  lambda_distill: 10.0
  distill_loss_order: 1

  robustness: {enabled: false, noise_scale: 0.005, warmup_steps: 0}
  input_noise: {enabled: false, noise_scale: 0.24, warmup_steps: 0}
  gradient_conflict: {enabled: false, weight: 0.0, every_k_steps: 1}

  eval:
    eval_every_steps: 999999
    attack_epochs: 1
    attack_lr: 0.00005
    num_render_samples: 1

misc:
  workspace: ./output/workspace_A_gradcap
  seed: 42
