# GeoTrap v2 (Plant) - focus on effective traps + stable defense precision
#
# Key changes vs configs/config.yaml:
# - defense.mixed_precision=no: avoid bf16 saturation in Gaussian activations (esp. opacity)
# - opacity trap: disable top-k tail mode (stabilize gradient + avoid bottleneck deadlock)
# - trap aggregation: sum (ensure all active traps get gradient signal)
# - more target pressure: lower source_ratio
# - enable AWP even under freeze-head (code now supports frozen head params)
#
# Suggested run:
#   ../venvs/3d-defense/bin/python -u script/run_pipeline.py --gpu 0 \
#     --config configs/config_geotrap_v2_plant.yaml \
#     --attack_steps 150 --defense_steps 200 --eval_every_steps 10 --num_render 1 \
#     --defense_cache_mode none --output_dir output/workspace_geotrap_v2_plant

model:
  size: big
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

# Keep LoRA config for hash/cache stability (even when training.mode=full).
lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules: [qkv, proj]

data:
  root: ./datas

  gso:
    render_dir: GSO/render_same_pose_all_50v_800_norm3.73

  source:
    dataset: objaverse
    max_samples: 400
    samples_per_object: 2

  target:
    dataset: gso
    categories: [plant]

  object_split:
    shoe: [0, 4, 10, 11, 14, 15, 16, 20, 24, 33, 34]
    plant: [2, 4, 8, 9]
    dish: [1, 3, 7, 9, 13]
    bowl: [0, 2, 6, 10]
    box: [1, 3, 5, 6, 10, 17, 21, 25, 26, 87, 126, 128]
  attack_samples_per_category: 5

  # Lower source_ratio => more target trap steps.
  source_ratio: 0.5
  source_val_ratio: 0.1
  val_samples: 20

  num_workers: 4
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 6
  samples_per_object: 5

training:
  mode: full
  batch_size: 2
  lr: 0.00003
  weight_decay: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 2
  lambda_lpips: 1.0
  mixed_precision: bf16

  optimizer: adamw
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  attack_steps: 150
  attack_epochs: null
  defense_steps: 200
  defense_epochs: null

attack:
  scenario: malicious_content
  mode: null
  malicious_content:
    malicious_categories: [plant]

defense:
  method: geotrap
  tag: geotrap_v2_plant

  # Keep cross-dataset setting: defense on omni, attack on gso.
  target:
    dataset: omni
    categories: null
    object_split: null
    samples_per_object: 5

  # Run defense forward in fp32 for stable Gaussian activations/gradients.
  mixed_precision: no

  trap_losses:
    position: {static: true, dynamic: false}
    scale: {static: true, dynamic: false}
    opacity:
      static: true
      dynamic: false
      # Disable tail top-k to avoid early saturation/dead gradients.
      topk_frac: null
      topk_k: null
    rotation: {static: false, dynamic: false}
    color: {static: false, dynamic: false}

  trap_aggregation:
    method: sum

  antishortcut:
    freeze_head: true

  grad_clip:
    mode: energy
    energy_mult: 5.0
    energy_apply_on: target

  awp:
    enabled: true
    rho: 0.001
    weight: 1.0
    every_k_steps: 1
    param_scope: head
    exclude_bias: true

  lambda_trap: 80.0
  lambda_distill: 200.0
  distill_loss_order: 1

  robustness: {enabled: false, noise_scale: 0.005, warmup_steps: 0}
  input_noise: {enabled: false, noise_scale: 0.10, warmup_steps: 0}
  gradient_conflict: {enabled: false, weight: 0.0, every_k_steps: 1}

  eval:
    eval_every_steps: 999999
    attack_epochs: 1
    attack_lr: 0.00005
    num_render_samples: 1

misc:
  workspace: ./output/workspace_geotrap_v2_plant
  seed: 42
