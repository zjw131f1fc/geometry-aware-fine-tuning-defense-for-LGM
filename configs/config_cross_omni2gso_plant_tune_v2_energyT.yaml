# Cross-dataset (Omni defense → GSO attack) - Plant - Tune for source + target-only energy cap
#
# Goal:
# - Keep the "write trap into UNet" effect (energy cap on TARGET steps)
# - Preserve source via higher source mixing + stronger distillation
#
# Suggested run (GPU1):
#   ../venvs/3d-defense/bin/python -u script/run_pipeline.py --gpu 1 \
#     --config configs/config_cross_omni2gso_plant_tune_v2_energyT.yaml --skip_baseline \
#     --defense_steps 200 --attack_steps 1000 --eval_every_steps 50 --num_render 1 \
#     --defense_cache_mode none --lr 0.0001 \
#     --tag cross_plant_tune_v2_energyT --output_dir output/cross_plant_tune_v2_energyT

model:
  size: big
  resume: ./lib/LGM/pretrained/model_fp16_fixrot.safetensors
  device: cuda

data:
  root: ./datas

  gso:
    render_dir: GSO/render_same_pose_all_50v_800_norm3.73

  source:
    dataset: objaverse
    max_samples: 40
    samples_per_object: 1

  target:
    dataset: gso
    categories: [plant]

  object_split:
    plant: [2, 4, 8, 9]
  attack_samples_per_category: 3

  # More source to preserve capability
  source_ratio: 0.55
  source_val_ratio: 0.1

  num_workers: 0
  view_selector: orthogonal
  angle_offset: 0.0
  num_supervision_views: 2
  samples_per_object: 2

training:
  mode: full
  batch_size: 1
  lr: 0.00003
  weight_decay: 0.05
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  lambda_lpips: 1.0
  mixed_precision: bf16

  optimizer: adamw
  optimizer_betas: [0.9, 0.95]
  optimizer_momentum: 0.9

  attack_steps: null
  attack_epochs: 1
  defense_steps: null
  defense_epochs: 1

attack:
  scenario: malicious_content
  mode: null
  malicious_content:
    malicious_categories: [plant]

defense:
  method: geotrap
  tag: cross_plant_tune_v2_energyT

  target:
    dataset: omni
    categories: [plant]
    object_split: null
    samples_per_object: 2

  trap_losses:
    position: {static: true, dynamic: false}
    scale: {static: true, dynamic: false}
    opacity:
      static: true
      dynamic: false
      topk_frac: 0.001
    rotation: {static: true, dynamic: false}
    color: {static: true, dynamic: false}

  trap_aggregation:
    method: bottleneck_logsumexp
    tau: 0.25

  antishortcut:
    freeze_head: true

  # Key: energy cap on TARGET steps only
  grad_clip:
    mode: energy
    energy_mult: 5.0
    energy_apply_on: target

  awp:
    enabled: false

  # Tune: less trap, more distill
  lambda_trap: 6.0
  lambda_distill: 80.0
  distill_loss_order: 1

  robustness: {enabled: false, noise_scale: 0.005, warmup_steps: 0}
  input_noise: {enabled: false, noise_scale: 0.10, warmup_steps: 0}
  gradient_conflict: {enabled: false, weight: 0.0, every_k_steps: 1}

  eval:
    eval_every_steps: 999999
    attack_epochs: 1
    attack_lr: 0.00005
    num_render_samples: 1

misc:
  workspace: ./output/workspace_cross_plant_tune_v2_energyT
  seed: 42

